version: "3.8"

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://halo:halo@postgres:5432/halo
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - DEPLOYER_ADDRESS=${DEPLOYER_ADDRESS}
      - DEPLOYER_PRIVATE_KEY=${DEPLOYER_PRIVATE_KEY}
      - STACKS_NETWORK=${STACKS_NETWORK:-mainnet}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - NEXT_PUBLIC_DEPLOYER_ADDRESS=${DEPLOYER_ADDRESS}
      - NEXT_PUBLIC_STACKS_NETWORK=${STACKS_NETWORK:-mainnet}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: halo
      POSTGRES_PASSWORD: halo
      POSTGRES_DB: halo
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U halo"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
